<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ASG 3 - The Dungeon Escape</title>

    <script src="../lib/cuon-matrix-cse160.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/webgl-utils.js"></script>

    <script src="../geometry/geometry.js"></script>
    <script src="../geometry/triangle.js"></script>
    <script src="../geometry/cube.js"></script>
    <script src="../geometry/square.js"></script>

    <script src="camera.js"></script>
    <script src="asg3.js"></script>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #111; color: #eee; font-family: sans-serif; }
      canvas { display: block; }

      #hud {
        position: fixed; top: 10px; left: 10px;
        font-size: 15px; text-shadow: 1px 1px 3px black;
        pointer-events: none; line-height: 1.8;
      }

      #crosshair {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        color: white; font-size: 24px;
        pointer-events: none; text-shadow: 0 0 4px black;
      }

      #gameOverlay {
        display: none;
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.9);
        padding: 36px 52px; text-align: center;
        border: 3px solid gold; border-radius: 14px; z-index: 100;
      }
      #overlayTitle { font-size: 32px; font-weight: bold; margin-bottom: 12px; }
      #overlayMsg   { font-size: 16px; margin-bottom: 20px; color: #ccc; }
      #overlayBtn {
        font-size: 16px; padding: 10px 28px;
        background: #333; color: white;
        border: 2px solid gold; border-radius: 8px;
        cursor: pointer;
      }
      #overlayBtn:hover { background: #555; }

      #controls { padding: 8px 12px; font-size: 13px; border-top: 1px solid #333; }
    </style>
  </head>

  <body onload="main()">
    <canvas id="webgl" width="800" height="600"></canvas>

    <div id="crosshair">+</div>

    <div id="hud">
      <div id="hudGolem">🔴 Golem: far away</div>
      <div id="hudGoal" >🟡 Find the golden treasure!</div>
    </div>

    <div id="gameOverlay">
      <div id="overlayTitle"></div>
      <div id="overlayMsg"></div>
      <button id="overlayBtn"
              onclick="restartGame()"
              onkeydown="if(event.key==='r'||event.key==='R'){restartGame();}">
        Play Again (or press R)
      </button>
    </div>

    <div id="controls">
      <b>The Dungeon Escape</b> &mdash; Find the gold cube before the red golem catches you! &nbsp;|&nbsp;
      W/S: forward/back &nbsp;|&nbsp;
      A/D: strafe left/right &nbsp;|&nbsp;
      Q/E: rotate left/right &nbsp;|&nbsp;
      Click + drag: mouse look &nbsp;|&nbsp;
      Left click: add block &nbsp;|&nbsp;
      Right click: delete block &nbsp;|&nbsp;
      R: restart
    </div>
  </body>
</html>
